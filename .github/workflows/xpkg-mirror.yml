name: xpkg-mirror-release

# Publishing is intentionally a separate, protected workflow.  PRs and the
# scanner are read-only; a maintainer or a post-merge release controller must
# provide a verified manifest before this job can publish immutable assets.
on:
  workflow_run:
    workflows: ["xpkg test"]
    types: [completed]
  workflow_dispatch:
    inputs:
      manifest:
        description: "Path to a verified manifest generated by xpkg-ci"
        required: true
        type: string

permissions:
  contents: read

jobs:
  discover:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.discover.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Publish with the current mainline mirror tooling. The event SHA is
          # still used below to identify which package files changed.
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Discover mirror packages
        id: discover
        env:
          EVENT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          sha = os.environ["EVENT_SHA"]
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", f"{sha}^", sha, "--", "pkgs/*/*.lua"],
              text=True,
          ).splitlines()
          packages = set()
          for file in changed:
              package = Path(file).stem
              output = subprocess.check_output(
                  ["python3", "tools/xpkg_ci.py", "--workspace", ".", "inspect", "--only", package],
                  text=True,
              )
              data = json.loads(output)
              if data["packages"] and data["packages"][0]["mirror"]:
                  packages.add(package)
          value = json.dumps(sorted(packages), separators=(",", ":"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"packages={value}\n")
          print(value)
          PY

  mirror:
    needs: discover
    if: needs.discover.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    runs-on: ubuntu-latest
    environment: xlings-res-publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mirror ${{ matrix.package }}
        env:
          GH_TOKEN: ${{ secrets.XLINGS_RES_TOKEN }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/xpkg-manifests/${{ matrix.package }}"
          mkdir -p "$out"
          python3 tools/xpkg_ci.py --workspace . materialize "${{ matrix.package }}" --output "$out"
          python3 tools/xpkg_ci.py --workspace . verify "$out/manifest.json"
          python3 tools/xpkg_ci.py --workspace . mirror "$out/manifest.json" --execute

  publish-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: xlings-res-publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish immutable xlings-res release
        env:
          GH_TOKEN: ${{ secrets.XLINGS_RES_TOKEN }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: python3 tools/xpkg_ci.py --workspace . verify "${{ inputs.manifest }}"
      - name: Mirror verified manifest
        env:
          GH_TOKEN: ${{ secrets.XLINGS_RES_TOKEN }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: python3 tools/xpkg_ci.py --workspace . mirror "${{ inputs.manifest }}" --execute
