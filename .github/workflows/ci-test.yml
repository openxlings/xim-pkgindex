name: pkgindex test

on:
  push:
    branches:
      - '**'
    paths:
      - 'pkgs/**'
      - '.github/workflows/ci-test.yml'
      - '.github/scripts/**'
  workflow_dispatch:

jobs:

  linux-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Installation Xlings on Ubuntu
        run: |
          export XLINGS_NON_INTERACTIVE=1
          export XLINGS_VERSION=v0.4.62
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings" >> "$GITHUB_ENV"
          echo "PATH=$HOME/.xlings/subos/current/bin:$HOME/.xlings/bin:$PATH" >> "$GITHUB_ENV"

      - name: Lint xpkg libpath policy
        run: |
          chmod +x .github/scripts/check-no-direct-ld-libpath.sh
          .github/scripts/check-no-direct-ld-libpath.sh

      - name: version-check unit tests (url_template + XLINGS_RES bump)
        run: python3 .github/scripts/test_version_check.py


      - name: Get changed-files (only pull_request）
        uses: tj-actions/changed-files@v46
        id: changed-files
        with:
          path: pkgs/

      - name: Package File Test
        run: |
          source ~/.bashrc
          export PATH=/home/xlings/.xlings_data/bin:$PATH
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "---"
            xpkg_file="${{ github.workspace }}/pkgs/$file"
            if grep -qP '^\s*package\s*=\s*\{.*\bref\s*=' "$xpkg_file"; then
              echo "⏩ Skip ref package: $file"
              continue
            fi
            output=$(xlings config --add-xpkg "$xpkg_file" 2>&1)
            echo "$output"
            if echo "$output" | grep -i "error"; then
              echo "❌ Error detected in $file"
              exit 1
            fi
          done

  windows-test:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install xlings on Windows
        shell: pwsh
        run: |
          $env:XLINGS_NON_INTERACTIVE = "1"
          $env:XLINGS_VERSION = "v0.4.62"
          iex (Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.ps1" `
            -UseBasicParsing).Content

          $xlingsHome = "$env:USERPROFILE\.xlings"
          if (-not (Test-Path "$xlingsHome\bin\xlings.exe")) {
            throw "xlings install did not produce $xlingsHome\bin\xlings.exe"
          }

          Add-Content $env:GITHUB_PATH "$xlingsHome\bin"
          Add-Content $env:GITHUB_PATH "$xlingsHome\subos\current\bin"
          Add-Content $env:GITHUB_ENV  "XLINGS_HOME=$xlingsHome"

      - name: Verify xlings
        shell: pwsh
        run: |
          xlings --version
          xlings config

      - name: Get changed-files
        uses: tj-actions/changed-files@v46
        id: changed-files
        with:
          files: pkgs/**/*.lua

      - name: Windows install/uninstall test (changed packages)
        if: steps.changed-files.outputs.any_changed == 'true'
        shell: pwsh
        run: |
          pwsh -NoProfile -File .github/scripts/windows-test.ps1 `
            -ChangedFiles "${{ steps.changed-files.outputs.all_changed_files }}" `
            -WorkspaceRoot "${{ github.workspace }}"

  linux-install-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install xlings on Ubuntu
        run: |
          export XLINGS_NON_INTERACTIVE=1
          export XLINGS_VERSION=v0.4.62
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings" >> "$GITHUB_ENV"
          echo "$HOME/.xlings/bin"               >> "$GITHUB_PATH"
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Verify xlings
        run: |
          xlings --version
          xlings config

      - name: Get changed-files
        uses: tj-actions/changed-files@v46
        id: changed-files
        with:
          files: pkgs/**/*.lua

      - name: Linux install/uninstall test (changed packages)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          chmod +x .github/scripts/posix-test.sh
          .github/scripts/posix-test.sh \
            "${{ steps.changed-files.outputs.all_changed_files }}" \
            "${{ github.workspace }}" \
            linux

  macos-install-test:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install xlings on macOS
        run: |
          export XLINGS_NON_INTERACTIVE=1
          export XLINGS_VERSION=v0.4.62
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings" >> "$GITHUB_ENV"
          echo "$HOME/.xlings/bin"               >> "$GITHUB_PATH"
          echo "$HOME/.xlings/subos/current/bin" >> "$GITHUB_PATH"

      - name: Verify xlings (and dump install layout)
        run: |
          xlings --version
          xlings config
          echo "--- which xlings ---"
          which xlings || true
          echo "--- find $HOME/.xlings (depth 4) ---"
          find "$HOME/.xlings" -maxdepth 4 -mindepth 1 \
              \( -type d -o -type f -o -type l \) \
              -print 2>/dev/null | head -80 || true

      - name: Get changed-files
        uses: tj-actions/changed-files@v46
        id: changed-files
        with:
          files: pkgs/**/*.lua

      - name: macOS install/uninstall test (changed packages)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          chmod +x .github/scripts/posix-test.sh
          # Disable exit-on-error so the post-test diagnostic always runs;
          # the captured rc is forwarded as this step's exit status.
          set +e
          .github/scripts/posix-test.sh \
            "${{ steps.changed-files.outputs.all_changed_files }}" \
            "${{ github.workspace }}" \
            macosx
          rc=$?
          set -e
          echo ""
          echo "============================================================"
          echo " post-test diagnostic dump (always runs)"
          echo "============================================================"
          echo "--- find $HOME/.xlings/subos (depth 4) ---"
          find "$HOME/.xlings/subos" -maxdepth 4 -mindepth 1 \
              \( -type d -o -type f -o -type l \) \
              -print 2>/dev/null | head -80 || true
          echo "--- find $HOME/.xlings/data/xpkgs (depth 4) ---"
          find "$HOME/.xlings/data/xpkgs" -maxdepth 4 -mindepth 1 \
              \( -type d -o -type f -o -type l \) \
              -print 2>/dev/null | head -40 || true
          exit $rc
