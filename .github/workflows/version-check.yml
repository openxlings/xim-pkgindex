name: xpkg-ci-scan

# Central Phase 1 dry-run for the package.ci update contract. The workflow
# wakes daily; .github/xpkg-ci.yml controls the effective interval and limits.
# Does NOT modify any package or open any pull request — that's Phase 2.

on:
  schedule:
    - cron: "17 2 * * *"   # central policy wake-up; package interval is policy-driven
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore central scan state
        uses: actions/cache/restore@v4
        with:
          path: .github/.xpkg-ci-state.json
          key: xpkg-ci-state-${{ github.run_id }}
          restore-keys: xpkg-ci-state-

      - name: Run xpkg-ci scan (dry-run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 tools/xpkg_ci.py --workspace . scan --state-file .github/.xpkg-ci-state.json | tee version-report.json

      - name: Save central scan state
        uses: actions/cache/save@v4
        with:
          path: .github/.xpkg-ci-state.json
          key: xpkg-ci-state-${{ github.run_id }}

      - name: Print update-available packages (if any)
        run: |
          python3 - <<'PY'
          import json, sys
          rep = json.load(open("version-report.json"))
          updates = [p for p in rep["packages"] if p["status"] == "update-available"]
          if not updates:
              print("(no updates available this run)")
              sys.exit(0)
          print(f"{len(updates)} package(s) with available updates:")
          for p in updates:
              print(f"  - {p['pkg']}: {p['current']} -> {p['upstream']}")
          PY

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-report
          path: version-report.json
          retention-days: 30
